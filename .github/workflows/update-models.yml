name: update-models

permissions:
  contents: read

on:
  workflow_dispatch:
  schedule:
    # Weekly, Monday 06:00 UTC.
    - cron: "0 6 * * 1"

jobs:
  refresh-snapshot:
    if: github.event_name == 'workflow_dispatch' || github.repository == 'docker/docker-agent'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.51.1

      - name: Refresh models.dev snapshot
        run: task update-models

      - name: Create pull request
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7.0.11
        with:
          commit-message: "chore: refresh embedded models.dev snapshot"
          title: "chore: refresh embedded models.dev snapshot"
          body: |
            Automated refresh of the models.dev catalog snapshot embedded in the
            docker-agent binary (`pkg/modelsdev/snapshot.json`).

            Generated by `task update-models`.
          branch: chore/update-models-snapshot
          delete-branch: true
          add-paths: |
            pkg/modelsdev/snapshot.json
            pkg/modelsdev/snapshot_date.txt
